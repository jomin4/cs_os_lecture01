<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OS 시각화 대시보드</title>
<style>
  :root{
    --bg:#f0f5fb; --panel:#ffffff; --ink:#1e293b; --sub:#64748b; --muted:#94a3b8;
    --line:#e2e8f0; --brand:#2563eb; --brand-soft:#e8f1ff; --brand-ink:#1d4ed8;
    --gray-bg:#eef2f7; --gray-ink:#475569;
    --amber-bg:#fef3c7; --amber-ink:#92400e;
    --teal-bg:#ccfbf1; --teal-ink:#0f766e;
    --red-bg:#fee2e2; --red-ink:#b91c1c;
    --purple-bg:#ede9fe; --purple-ink:#6d28d9;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:-apple-system,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--ink); display:flex; min-height:100vh;}
  code{font-family:"SF Mono",Consolas,monospace;}
  button{font-family:inherit; cursor:pointer;}

  /* Sidebar */
  aside{width:264px; background:var(--panel); border-right:1px solid var(--line);
    padding:20px 16px; display:flex; flex-direction:column; gap:6px; flex-shrink:0;}
  .brand{display:flex; align-items:center; gap:10px; padding:4px 8px 16px;}
  .brand .dot{width:30px; height:30px; border-radius:9px; background:var(--brand);
    display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:15px;}
  .brand h1{font-size:15px; margin:0; font-weight:600;}
  .brand p{font-size:11px; margin:2px 0 0; color:var(--muted);}
  .chapter{font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase;
    letter-spacing:.04em; padding:14px 10px 6px;}
  .nav{display:flex; align-items:center; gap:9px; padding:9px 11px; border-radius:10px;
    font-size:13.5px; color:var(--gray-ink); border:1px solid transparent; text-align:left; background:none; width:100%;}
  .nav:hover{background:var(--bg);}
  .nav.active{background:var(--brand-soft); color:var(--brand-ink); font-weight:600; border-color:#dbeafe;}
  .nav .ic{width:22px; height:22px; border-radius:7px; background:var(--gray-bg); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:12px;}
  .nav.active .ic{background:#fff;}

  /* Main */
  main{flex:1; padding:28px 34px; overflow:auto;}
  .head{display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;}
  .head h2{font-size:20px; margin:0; font-weight:600;}
  .head .tag{font-size:12px; color:var(--brand-ink); background:var(--brand-soft);
    padding:5px 12px; border-radius:20px; font-weight:600;}
  .stage{background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:26px;
    box-shadow:0 1px 3px rgba(15,23,42,.04);}

  /* Shared viz components */
  .bar{display:flex; align-items:center; gap:14px; padding:14px 18px; background:var(--bg);
    border-radius:12px; margin-bottom:18px; flex-wrap:wrap;}
  .pill{font-family:"SF Mono",Consolas,monospace; font-size:17px; font-weight:700;
    padding:5px 16px; border-radius:9px;}
  .procgrid{display:grid; gap:12px; margin-bottom:16px;}
  .card{border-radius:14px; padding:16px; border:1px solid var(--line);}
  .card h3{margin:0; font-family:"SF Mono",Consolas,monospace; font-size:16px; font-weight:700;}
  .card .st{font-size:12px; margin-top:4px; min-height:15px;}
  .btn{width:100%; margin-top:11px; padding:9px; border-radius:9px; font-size:13px; font-weight:600;
    border:1px solid var(--brand); background:var(--brand); color:#fff; transition:.12s;}
  .btn:hover{background:var(--brand-ink);}
  .btn.ghost{background:#fff; color:var(--gray-ink); border-color:var(--line);}
  .btn.ghost:hover{background:var(--bg);}
  .toolbar{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:16px;}
  .mode{padding:9px 14px; border-radius:10px; font-size:13px; font-weight:600; background:#fff;
    border:1px solid var(--line); color:var(--gray-ink);}
  .mode.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-ink);}
  .hint{font-size:12.5px; color:var(--muted);}
  .log{margin-top:16px; padding:13px 16px; background:#f8fafc; border:1px solid var(--line);
    border-radius:12px; font-family:"SF Mono",Consolas,monospace; font-size:12.5px; line-height:1.85;
    min-height:96px; color:var(--sub);}
  .g-gray{background:var(--gray-bg); color:var(--gray-ink);}
  .g-amber{background:var(--amber-bg); color:var(--amber-ink);}
  .g-teal{background:var(--teal-bg); color:var(--teal-ink);}
  .g-red{background:var(--red-bg); color:var(--red-ink);}
  .g-purple{background:var(--purple-bg); color:var(--purple-ink);}

  /* Timeline viz */
  .trow{display:flex; align-items:center; gap:10px; margin-bottom:9px;}
  .tlab{width:92px; text-align:right; font-family:"SF Mono",Consolas,monospace; font-size:12.5px; color:var(--sub);}
  .track{position:relative; flex:1; height:34px; background:var(--bg); border-radius:9px;}
  .seg{position:absolute; top:3px; height:28px; border-radius:7px; display:flex; align-items:center;
    justify-content:center; font-size:11px; overflow:hidden; white-space:nowrap;}
</style>
</head>
<body>
<aside>
  <div class="brand">
    <div class="dot">OS</div>
    <div><h1>OS 시각화 대시보드</h1><p>운영체제 실습 인터랙션</p></div>
  </div>
  <div id="navlist"></div>
</aside>

<main>
  <div class="head">
    <h2 id="title"></h2>
    <span class="tag" id="tag"></span>
  </div>
  <div class="stage" id="stage"></div>
</main>

<script>
const CATALOG = [];
function register(v){ CATALOG.push(v); }

/* ── Viz 1: TAS 상호배제 ───────────────────────── */
register({
  id:'tas', chapter:'Lecture06', icon:'🔒',
  title:'TAS 상호배제', tag:'Test-and-Set',
  mount(root){
    let lock=false, logs=[];
    const P=[{id:'P1',s:'out'},{id:'P2',s:'out'},{id:'P3',s:'out'}];
    const G={out:'g-gray',spin:'g-amber',crit:'g-teal'};
    const L={out:'진입 전',spin:'대기 (spin)',crit:'임계구역 실행'};
    root.innerHTML=`
      <div class="bar"><code>lock =</code><span class="pill" id="lk"></span>
        <span style="flex:1"></span><span class="hint" id="hold"></span></div>
      <div class="procgrid" id="pg" style="grid-template-columns:repeat(3,1fr)"></div>
      <div class="toolbar"><button class="mode" id="rs">초기화</button>
        <span class="hint">각 프로세스의 TAS(lock)을 눌러 진입을 시도</span></div>
      <div class="log" id="lg"></div>`;
    const $=s=>root.querySelector(s);
    const log=m=>{logs.unshift('▸ '+m); if(logs.length>6)logs.pop();
      $('#lg').innerHTML=logs.map((l,i)=>`<div style="opacity:${1-i*.13}">${l}</div>`).join('');};
    function tas(i){const p=P[i]; if(p.s==='crit')return;
      const old=lock; lock=true;
      if(!old){p.s='crit'; log(`${p.id}: TAS→${old} 반환 → 임계구역 진입! (lock=true)`);}
      else{p.s='spin'; log(`${p.id}: TAS→true 반환 → 이미 점유, 대기(spin)`);} draw();}
    function rel(i){lock=false; P[i].s='out'; log(`${P[i].id}: lock ← false (반납)`); draw();}
    function draw(){
      $('#lk').textContent=lock; $('#lk').className='pill '+(lock?'g-amber':'g-teal');
      const c=P.filter(p=>p.s==='crit'); $('#hold').textContent=c.length?`임계구역: ${c[0].id}`:'임계구역: 비어 있음';
      $('#pg').innerHTML=P.map((p,i)=>`<div class="card ${G[p.s]}"><h3>${p.id}</h3><div class="st">${L[p.s]}</div>`+
        (p.s==='crit'?`<button class="btn ghost" data-r="${i}">lock ← false</button>`
                     :`<button class="btn" data-t="${i}">TAS(lock)</button>`)+`</div>`).join('');
      $('#pg').querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>tas(+b.dataset.t));
      $('#pg').querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>rel(+b.dataset.r));
    }
    $('#rs').onclick=()=>{lock=false; P.forEach(p=>p.s='out'); logs=[]; $('#lg').innerHTML=''; draw();};
    draw();
  }
});

/* ── Viz 2: 원자성 · race condition ─────────────── */
register({
  id:'atom', chapter:'Lecture06', icon:'⚛️',
  title:'원자성 · Race', tag:'Atomicity',
  mount(root){
    let atomic=false, lock=false, logs=[];
    const P=[{id:'P1',pc:0,old:null,s:'ready'},{id:'P2',pc:0,old:null,s:'ready'}];
    const NON=['old ← lock (읽기)','lock ← true (쓰기)','판정: old==false?'];
    root.innerHTML=`
      <div class="toolbar"><button class="mode" id="mn">비원자적 (읽기+쓰기 분리)</button>
        <button class="mode" id="ma">원자적 (하드웨어 TAS)</button></div>
      <div class="bar"><code>lock =</code><span class="pill" id="lk"></span>
        <span style="flex:1"></span><span class="hint" id="vd"></span></div>
      <div class="procgrid" id="pg" style="grid-template-columns:1fr 1fr"></div>
      <div class="toolbar"><button class="mode" id="rs">초기화</button>
        <span class="hint" id="ht"></span></div>
      <div class="log" id="lg"></div>`;
    const $=s=>root.querySelector(s);
    const log=m=>{logs.unshift('▸ '+m); if(logs.length>7)logs.pop();
      $('#lg').innerHTML=logs.map((l,i)=>`<div style="opacity:${1-i*.12}">${l}</div>`).join('');};
    function check(){const cs=P.filter(p=>p.s==='crit');
      $('#vd').innerHTML=cs.length>=2?'<span style="color:var(--red-ink);font-weight:700">⚠ RACE! 둘 다 진입 — 상호배제 붕괴</span>'
        :cs.length===1?`<span style="color:var(--teal-ink);font-weight:600">${cs[0].id} 실행 중 (정상)</span>`:'';}
    function stepN(p){if(p.s==='crit'||p.s==='spin')return;
      if(p.pc===0){p.old=lock; log(`${p.id}: old ← lock → old=${p.old}`); p.pc=1;}
      else if(p.pc===1){lock=true; log(`${p.id}: lock ← true`); p.pc=2;}
      else{if(!p.old){p.s='crit'; log(`${p.id}: old==false → 진입!`);}else{p.s='spin'; log(`${p.id}: old==true → 대기`);} p.pc=3;}}
    function stepA(p){if(p.s==='crit'||p.s==='spin')return; const old=lock; lock=true;
      if(!old){p.s='crit'; log(`${p.id}: TAS→${old} (원자적) → 진입!`);}else{p.s='spin'; log(`${p.id}: TAS→true → 대기`);} p.pc=3;}
    function act(i){(atomic?stepA:stepN)(P[i]); draw(); check();}
    function rel(i){lock=false; P[i].s='ready'; P[i].pc=0; P[i].old=null; log(`${P[i].id}: lock ← false`); draw(); check();}
    function draw(){
      $('#lk').textContent=lock; $('#lk').className='pill '+(lock?'g-amber':'g-teal');
      $('#pg').innerHTML=P.map((p,i)=>{
        const cls=p.s==='crit'?'g-teal':p.s==='spin'?'g-amber':'g-gray';
        let nx=p.s==='crit'?`<button class="btn ghost" data-r="${i}">lock ← false</button>`
          :p.s==='spin'?`<div class="st" style="margin-top:11px">대기 중</div>`
          :`<button class="btn" data-a="${i}">${atomic?'TAS(lock) 실행':'다음: '+NON[p.pc]}</button>`;
        const micro=atomic?'':`<div style="font-family:monospace;font-size:11px;margin-top:8px">`+
          NON.map((s,x)=>{const d=x<p.pc,c=x===p.pc&&p.s==='ready';
            return `<div style="opacity:${d?.4:1};font-weight:${c?700:400}">${d?'✓ ':c?'▶ ':'  '}${s}</div>`;}).join('')+`</div>`;
        return `<div class="card ${cls}"><h3>${p.id}${p.old!==null&&!atomic?` <span style="font-size:12px;font-weight:400">(old=${p.old})</span>`:''}</h3>${micro}${nx}</div>`;
      }).join('');
      $('#pg').querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>act(+b.dataset.a));
      $('#pg').querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>rel(+b.dataset.r));
    }
    function reset(){lock=false; logs=[]; $('#lg').innerHTML=''; P.forEach(p=>{p.pc=0;p.old=null;p.s='ready';}); draw(); $('#vd').textContent='';}
    function mode(a){atomic=a; reset();
      $('#ht').textContent=a?'한 번의 클릭이 읽기+쓰기를 통째 실행 — 못 낌':'P1 읽기 직후 P2 읽기를 눌러보세요 — 둘 다 old=false';
      $('#mn').className='mode'+(a?'':' on'); $('#ma').className='mode'+(a?' on':'');}
    $('#mn').onclick=()=>mode(false); $('#ma').onclick=()=>mode(true); $('#rs').onclick=reset;
    mode(false);
  }
});

/* ── Viz 3: 스레드 start / join 타임라인 ─────────── */
register({
  id:'thread', chapter:'Lecture06', icon:'🧵',
  title:'스레드 start/join', tag:'threading',
  mount(root){
    const GOOD=[
      {n:'main',c:'g-gray',s:[{a:0,w:1,t:'start 3개'},{a:9,w:1,t:'join→출력'}]},
      {n:'worker P1',c:'g-teal',s:[{a:1,w:8,t:'counter 증가'}]},
      {n:'worker P2',c:'g-amber',s:[{a:1,w:8,t:'counter 증가'}]},
      {n:'worker P3',c:'g-purple',s:[{a:1,w:8,t:'counter 증가'}]}];
    const BAD=[
      {n:'main',c:'g-gray',s:[{a:0,w:.6,t:'start'},{a:3.4,w:.6,t:'start'},{a:6.8,w:.6,t:'start'},{a:9.6,w:.4,t:'출력'}]},
      {n:'worker P1',c:'g-teal',s:[{a:.6,w:2.8,t:'증가'}]},
      {n:'worker P2',c:'g-amber',s:[{a:4,w:2.8,t:'증가'}]},
      {n:'worker P3',c:'g-purple',s:[{a:7.4,w:2.2,t:'증가'}]}];
    root.innerHTML=`
      <div class="toolbar"><button class="mode" id="bg">start 전부 → join 전부</button>
        <button class="mode" id="bb">start+join 한 번에</button></div>
      <div id="tl"></div>
      <div class="log" id="cap" style="font-family:inherit;font-size:13.5px;min-height:auto"></div>`;
    const $=s=>root.querySelector(s);
    function draw(rows,good){
      $('#tl').innerHTML=rows.map(r=>`<div class="trow"><div class="tlab">${r.n}</div>`+
        `<div class="track">`+r.s.map(s=>`<div class="seg ${r.c}" style="left:${s.a*10}%;width:${s.w*10}%">${s.t}</div>`).join('')+`</div></div>`).join('')+
        `<div class="trow"><div class="tlab"></div><div style="flex:1;display:flex;justify-content:space-between;font-size:12px;color:var(--muted)"><span>시간 →</span><span>완료</span></div></div>`;
      $('#cap').innerHTML=good?'세 워커가 <b>같은 구간에서 겹쳐</b> 돕니다 — 동시에 counter를 건드려 race condition 발생.'
        :'한 워커를 start하고 <b>곧바로 join</b> — 겹침이 없어 순차 실행, <b>경쟁이 안 일어남</b>.';
      $('#bg').className='mode'+(good?' on':''); $('#bb').className='mode'+(good?'':' on');
    }
    $('#bg').onclick=()=>draw(GOOD,true); $('#bb').onclick=()=>draw(BAD,false);
    draw(GOOD,true);
  }
});

/* ── Viz 4: 스핀락 vs 블로킹 락 (CPU 낭비) ──────── */
register({
  id:'spin', chapter:'Lecture06', icon:'⏳',
  title:'스핀락 vs 블로킹', tag:'busy-wait',
  mount(root){
    let mode='spin', lock=false, wasted=0, logs=[], timer=null;
    const T=[{id:'T1',s:'idle',sp:0},{id:'T2',s:'idle',sp:0},{id:'T3',s:'idle',sp:0},{id:'T4',s:'idle',sp:0}];
    const Q=[];
    root.innerHTML=`
      <div class="toolbar">
        <button class="mode" id="ms">스핀락 (busy-wait)</button>
        <button class="mode" id="mb">블로킹 락 (sleep)</button>
        <span style="flex:1"></span>
        <button class="mode" id="pl">▶ 자동 진행</button>
        <button class="mode" id="rs">초기화</button></div>
      <div class="bar"><code>lock =</code><span class="pill" id="lk"></span>
        <span style="flex:1"></span><span class="hint">CPU 낭비</span>
        <div style="width:170px;height:11px;background:var(--line);border-radius:6px;overflow:hidden">
          <div id="cpu" style="height:100%;width:0;background:var(--red-ink);transition:.2s"></div></div>
        <span class="hint" id="wn" style="width:42px">0</span></div>
      <div class="procgrid" id="pg" style="grid-template-columns:repeat(4,1fr)"></div>
      <div class="log" id="lg"></div>`;
    const $=s=>root.querySelector(s);
    const log=m=>{logs.unshift('▸ '+m); if(logs.length>6)logs.pop();
      $('#lg').innerHTML=logs.map((l,i)=>`<div style="opacity:${1-i*.13}">${l}</div>`).join('');};
    function acquire(i){const t=T[i]; if(t.s!=='idle')return;
      if(!lock){lock=true; t.s='hold'; log(`${t.id}: 락 획득 → 임계구역 진입`);}
      else{t.s='wait'; Q.push(i); log(`${t.id}: 락 사용 중 → 대기`);} draw();}
    function release(i){const t=T[i]; lock=false; t.s='idle'; t.sp=0; log(`${t.id}: release (lock=false)`);
      if(Q.length){const n=Q.shift(); T[n].s='hold'; T[n].sp=0; lock=true; log(`${T[n].id}: 대기 끝 → 락 획득`);} draw();}
    function tick(){ if(!document.body.contains(root)){clearInterval(timer); return;}
      const w=T.filter(t=>t.s==='wait');
      if(mode==='spin' && w.length){ w.forEach(t=>t.sp++); wasted+=w.length; }
      draw();}
    function draw(){
      $('#lk').textContent=lock; $('#lk').className='pill '+(lock?'g-amber':'g-teal');
      $('#cpu').style.width=Math.min(100,wasted)+'%'; $('#wn').textContent=wasted;
      $('#pg').innerHTML=T.map((t,i)=>{
        let cls,st,btn;
        if(t.s==='hold'){cls='g-teal'; st='임계구역 실행'; btn=`<button class="btn ghost" data-r="${i}">release</button>`;}
        else if(t.s==='wait'){
          cls=mode==='spin'?'g-amber':'g-gray';
          st=mode==='spin'?`spin ×${t.sp} · CPU 낭비`:'sleep · 대기 큐';
          btn=`<div class="st" style="margin-top:11px">대기 중</div>`;
        } else {cls='g-gray'; st='유휴'; btn=`<button class="btn" data-a="${i}">락 요청</button>`;}
        return `<div class="card ${cls}"><h3>${t.id}</h3><div class="st">${st}</div>${btn}</div>`;
      }).join('');
      $('#pg').querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>acquire(+b.dataset.a));
      $('#pg').querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>release(+b.dataset.r));
    }
    function reset(){lock=false; wasted=0; logs=[]; Q.length=0; $('#lg').innerHTML='';
      T.forEach(t=>{t.s='idle'; t.sp=0;}); draw();}
    function setMode(m){mode=m; $('#ms').className='mode'+(m==='spin'?' on':''); $('#mb').className='mode'+(m==='block'?' on':''); draw();}
    $('#ms').onclick=()=>setMode('spin'); $('#mb').onclick=()=>setMode('block');
    $('#rs').onclick=reset;
    $('#pl').onclick=e=>{ if(timer){clearInterval(timer); timer=null; e.target.textContent='▶ 자동 진행'; e.target.classList.remove('on');}
      else{timer=setInterval(tick,600); e.target.textContent='⏸ 멈춤'; e.target.classList.add('on');}};
    setMode('spin');
  }
});

/* ── 라우팅 ────────────────────────────────────── */
const nav=document.getElementById('navlist');
let chap='';
CATALOG.forEach((v,i)=>{
  if(v.chapter!==chap){chap=v.chapter; const h=document.createElement('div'); h.className='chapter'; h.textContent=chap; nav.appendChild(h);}
  const b=document.createElement('button'); b.className='nav'; b.dataset.id=v.id;
  b.innerHTML=`<span class="ic">${v.icon}</span>${v.title}`;
  b.onclick=()=>select(v.id); nav.appendChild(b);
});
function select(id){
  const v=CATALOG.find(x=>x.id===id);
  document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  document.getElementById('title').textContent=v.title;
  document.getElementById('tag').textContent=v.tag;
  const stage=document.getElementById('stage'); stage.innerHTML=''; v.mount(stage);
}
select(CATALOG[0].id);
</script>
</body>
</html>
